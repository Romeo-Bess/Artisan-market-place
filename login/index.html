<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Sign In | Artisane</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600;700;800&amp;family=Hanken+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#123358",
                        "secondary": "#94492d",
                        "background": "#faf9f7",
                        "surface": "#faf9f7",
                        "surface-container-low": "#f4f3f1",
                        "surface-container": "#efeeec",
                        "outline": "#74777f",
                        "outline-variant": "#c3c6cf",
                        "on-surface": "#1a1c1b",
                        "on-surface-variant": "#43474e"
                    },
                    fontFamily: {
                        "label-sm": ["Hanken Grotesk"],
                        "headline-lg": ["EB Garamond"],
                        "headline-md": ["EB Garamond"],
                        "body-md": ["Hanken Grotesk"]
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --color-background: 250 249 247;
            --color-on-background: 26 28 27;
            --color-primary: 18 51 88;
            --color-on-primary: 255 255 255;
            --color-secondary: 148 73 45;
            --color-on-secondary: 255 255 255;
            --color-surface: 250 249 247;
            --color-on-surface: 26 28 27;
            --color-surface-container: 239 238 236;
            --color-surface-container-low: 244 243 241;
            --color-outline: 116 119 127;
            --color-outline-variant: 195 198 207;
            --color-error: 186 26 26;
            --color-error-container: 255 218 214;
            --color-on-error-container: 147 0 10;
        }
        html.dark {
            --color-background: 15 17 21;
            --color-on-background: 226 226 228;
            --color-primary: 168 199 250;
            --color-on-primary: 6 46 92;
            --color-secondary: 253 158 123;
            --color-on-secondary: 85 32 10;
            --color-surface: 22 25 31;
            --color-on-surface: 226 226 228;
            --color-surface-container: 31 35 43;
            --color-surface-container-low: 27 30 37;
            --color-outline: 142 145 153;
            --color-outline-variant: 67 71 78;
            --color-error: 255 180 171;
            --color-error-container: 68 0 3;
        }
        body {
            background-color: #faf9f7;
            font-family: 'Hanken Grotesk', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .custom-shadow {
            box-shadow: 0 40px 40px -20px rgba(18, 51, 88, 0.04);
        }
    </style>
</head>
<body class="text-on-surface bg-background min-h-screen flex flex-col justify-between">
    <!-- Top Header Navigation (Simple for Auth pages) -->
    <header class="w-full py-6 px-10 border-b border-outline-variant/30">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="../index.html" class="font-headline-lg text-3xl text-primary tracking-tight font-medium">Artisane</a>
            <a href="../index.html" class="text-label-md text-on-surface-variant hover:text-primary transition-colors flex items-center gap-1">
                <span class="material-symbols-outlined text-[18px]">arrow_back</span> Back to gallery
            </a>
        </div>
    </header>

    <!-- Main Content (Login Card) -->
    <main class="flex-grow flex items-center justify-center px-4 py-12">
        <div class="w-full max-w-md bg-surface border border-outline-variant/50 p-8 custom-shadow rounded-sm">
            <div class="text-center mb-8">
                <h2 class="font-headline-lg text-3xl text-primary mb-2">Sign In to Artisane</h2>
                <p class="font-body-md text-on-surface-variant">Access your collection, bids, and profile</p>
            </div>

            <!-- Error alert -->
            <div id="auth-error" class="hidden mb-6 p-4 bg-red-50 border border-red-200 text-red-700 text-sm rounded-sm"></div>

            <form id="form-login" class="space-y-6">
                <div>
                    <label for="login-email" class="block text-sm font-medium text-on-surface-variant mb-2">Email Address</label>
                    <input type="email" id="login-email" required class="w-full px-4 py-3 border border-outline-variant/60 rounded-sm bg-surface-container-low text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"/>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label for="login-password" class="block text-sm font-medium text-on-surface-variant">Password</label>
                        <a href="#" class="text-xs text-secondary hover:underline">Forgot password?</a>
                    </div>
                    <input type="password" id="login-password" required class="w-full px-4 py-3 border border-outline-variant/60 rounded-sm bg-surface-container-low text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"/>
                </div>

                <div class="flex items-center">
                    <input type="checkbox" id="remember-me" class="h-4 w-4 text-primary focus:ring-primary border-outline-variant/60 rounded-sm"/>
                    <label for="remember-me" class="ml-2 block text-sm text-on-surface-variant">Remember me for 30 days</label>
                </div>

                <button type="submit" id="btn-login" class="w-full bg-primary text-white py-3 rounded-sm font-medium hover:bg-opacity-90 transition-opacity flex items-center justify-center gap-2">
                    Sign In
                </button>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer class="w-full border-t border-outline-variant/30 py-6 text-center bg-surface">
        <p class="font-label-sm text-xs text-on-surface-variant/60">&copy; 2024 Artisane Gallery. All rights reserved.</p>
    </footer>

    <!-- Scripts -->
    <script src="../js/theme-toggle-helper.js" type="module"></script>
    <script type="module">
        import { supabase } from '../js/supabase-auth.js';

        const errorEl = document.getElementById('auth-error');
        const form = document.getElementById('form-login');
        const btn = document.getElementById('btn-login');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorEl.classList.add('hidden');
            btn.disabled = true;
            btn.textContent = 'Signing In...';

            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            try {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });

                if (error) {
                    errorEl.textContent = error.message;
                    errorEl.classList.remove('hidden');
                    btn.disabled = false;
                    btn.textContent = 'Sign In';
                } else {
                    // Link cart to authenticated user if cart exists
                    const cartId = localStorage.getItem('artisane_cart_id');
                    if (cartId && cartId !== 'undefined') {
                        await supabase.from('carts').update({ user_id: data.user.id }).eq('id', cartId);
                    }
                    // Redirect to collector dashboard
                    window.location.href = '../collector-dashboard.html';
                }
            } catch (err) {
                errorEl.textContent = 'An unexpected error occurred during sign in.';
                errorEl.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
